services:
  api:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    container_name: scaffoldix_api
    working_dir: /var/www/html
    volumes:
      - ./apps/api:/var/www/html
      - api_vendor:/var/www/html/vendor
    ports:
      - "8000:8000"
    depends_on:
      - mysql
      - mailpit
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: "http://localhost:8000"

      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: "3306"
      DB_DATABASE: scaffoldix
      DB_USERNAME: scaffoldix
      DB_PASSWORD: secret

      MAIL_MAILER: smtp
      MAIL_HOST: mailpit
      MAIL_PORT: "1025"
      MAIL_FROM_ADDRESS: noreply@scaffoldix.local
      MAIL_FROM_NAME: ScaffoldIX
    command: sh -c "composer install && php artisan serve --host=0.0.0.0 --port=8000"

  web:
    image: node:22-alpine
    container_name: scaffoldix_web
    working_dir: /app
    volumes:
      - ./apps/web:/app
      - web_node_modules:/app/node_modules
      - web_next_cache:/app/.next
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      NEXT_TELEMETRY_DISABLED: "1"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      CHOKIDAR_INTERVAL: "1000"
      NEXT_PUBLIC_API_URL: "http://localhost:8000"
      INTERNAL_API_URL: "http://api:8000"
    command: sh -c "npm install && npm run dev -- -H 0.0.0.0"
    depends_on:
      - api

  mysql:
    image: mysql:8.4
    container_name: scaffoldix_mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: scaffoldix
      MYSQL_USER: scaffoldix
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    volumes:
      - mysql_data:/var/lib/mysql

  adminer:
    image: adminer:latest
    container_name: scaffoldix_adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    depends_on:
      - mysql

  mailpit:
    image: axllent/mailpit:latest
    container_name: scaffoldix_mailpit
    restart: unless-stopped
    ports:
      - "8025:8025"
      - "1025:1025"

volumes:
  mysql_data:
  api_vendor:
  web_node_modules:
  web_next_cache: